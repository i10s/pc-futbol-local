name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    name: Shell + Python + server test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck
        run: shellcheck -e SC1091 pcf scripts/lib.sh scripts/selftest.sh scripts/prewarm.sh mirror/cloudflare/sync-to-r2.sh

      - name: Python syntax
        run: python3 -m py_compile scripts/serve.py scripts/_game.py scripts/check-games.py

      - name: Validate games.json
        run: python3 scripts/check-games.py

      - name: serve.py self-test (HTTP Range + security)
        run: bash scripts/selftest.sh

      - name: Launcher smoke (list/doctor, no downloads)
        run: |
          chmod +x pcf
          ./pcf list
          ./pcf doctor
          ./pcf doctor --json | python3 -m json.tool >/dev/null
          ./pcf verify

  agent:
    name: Agent driver + parser tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Syntax check
        run: node --check .github/agent/run-agent.mjs
      - name: Parser unit tests
        run: node .github/agent/run-agent.test.mjs

  formula:
    name: Homebrew formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ruby syntax
        run: ruby -c Formula/pc-futbol-local.rb
      - name: Set up Homebrew
        # Pinned to a commit SHA (supply-chain safety); Dependabot bumps it.
        uses: Homebrew/actions/setup-homebrew@d4a9d3894e99dfb50a41c089a3dfcbd6009152a1 # master
      - name: brew style
        run: brew style Formula/pc-futbol-local.rb

  powershell:
    name: PowerShell launcher parses
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Parse pcf.ps1
        shell: pwsh
        run: |
          $errs = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD/pcf.ps1", [ref]$null, [ref]$errs) | Out-Null
          if ($errs -and $errs.Count -gt 0) {
            $errs | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
          Write-Host "pcf.ps1 parses OK"

      - name: Launcher smoke (list/doctor, no downloads)
        shell: pwsh
        run: |
          .\pcf.ps1 list
          .\pcf.ps1 doctor
