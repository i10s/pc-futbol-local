#:schema node_modules/wrangler/config-schema.json
# PC Fútbol Local — Cloudflare mirror
# Deploy:  cd mirror/cloudflare && npx wrangler deploy
name = "pcf-mirror"
main = "worker.js"
compatibility_date = "2025-06-01"

# Workers Logs (free, handy to watch cache hit ratio / requests).
[observability]
enabled = true

# --- Mode 1: proxy + edge cache (default) ------------------------------------
# The Worker reverse-proxies these origins and lets Cloudflare cache them.
#   ORIGIN        → disk images (*.bin), cached immutably (~1 year).
#   KIOSK_ORIGIN  → front-end / runtime, cached briefly + revalidated so it
#                   tracks upstream updates with almost no origin load.
[vars]
ORIGIN = "https://discos.dinamicmultimedia.es"
KIOSK_ORIGIN = "https://online.dinamicmultimedia.es"

# --- Custom domain -----------------------------------------------------------
# After adding your zone to Cloudflare, expose the Worker on a clean hostname:
# routes = [
#   { pattern = "pcf.example.com", custom_domain = true }
# ]

# --- Mode 2: serve from R2 (zero egress) -------------------------------------
# 1) npx wrangler r2 bucket create pcf-disks
# 2) ./sync-to-r2.sh            # one-time copy from the official origin
# 3) uncomment the binding below and redeploy
# [[r2_buckets]]
# binding = "DISKS"
# bucket_name = "pcf-disks"

# --- Shared career saves (opt-in) --------------------------------------------
# Lets players share a saved career via a short code: the kiosk uploads a tiny
# ".pcfsave" blob here and a friend downloads it by code. Strictly validated in
# worker.js (magic bytes, 4 MB cap, unguessable codes, 90-day expiry). Remove
# this binding to disable the feature (the endpoints then return 503).
#   npx wrangler r2 bucket create pcf-saves
[[r2_buckets]]
binding = "SAVES"
bucket_name = "pcf-saves"
